services:
  # Ambiente de Desenvolvimento (Vite com Hot Reload)
  app-dev:
    image: node:20-alpine
    container_name: acai-erp-saas-2-3-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules # Evita sobrescrever node_modules do container com o do host
    ports:
      - "9999:9999"
    environment:
      - NODE_ENV=development
      - VITE_PORT=9999
    # Instala dependências se node_modules estiver vazio e inicia o dev server
    command: sh -c "if [ ! -d 'node_modules' ]; then npm install --legacy-peer-deps; fi && npm run dev -- --host 0.0.0.0"
    tty: true

  # Ambiente de Produção (Simulação local com Nginx)
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: acai-erp-saas-2-3:latest
    container_name: acai-erp-saas-2-3-prod
    ports:
      - "8080:80"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
