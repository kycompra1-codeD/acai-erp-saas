# ============================================================
# Zullya ERP - Docker Compose (Produção / VPS Hostinger)
# zullya.com.br     → site institucional (Next.js)
# app.zullya.com.br → ERP (React)
# api.zullya.com.br → API (Node.js)
# SSL automático via Traefik + Let's Encrypt
# ============================================================

networks:
  zullya-net:
    driver: bridge

services:

  # ============================================================
  # BANCO DE DADOS - PostgreSQL 16
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: zullya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-zullya_erp}
      POSTGRES_USER: ${DB_USER:-zullya_erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zullya_senha_local}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - zullya-net
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zullya_erp_user} -d ${DB_NAME:-zullya_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # CACHE E SESSÕES - Redis 7
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: zullya-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - zullya-net
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # BACKEND - API Node.js  →  api.zullya.com.br
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zullya-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-zullya_erp}
      DB_USER: ${DB_USER:-zullya_erp_user}
      DB_PASSWORD: ${DB_PASSWORD:-zullya_senha_local}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_minimo_32_caracteres_aqui}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_minimo_32_caracteres}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.zullya.com.br}
      RRPAY_WEBHOOK_SECRET: ${RRPAY_WEBHOOK_SECRET:-}
      RRPAY_API_KEY: ${RRPAY_API_KEY:-}
      RRPAY_BASE_URL: ${RRPAY_BASE_URL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Zullya ERP <noreply@zullya.com.br>}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - zullya-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=zullya-erp_zullya-net"
      - "traefik.http.routers.zullya-api.rule=Host(`api.zullya.com.br`)"
      - "traefik.http.routers.zullya-api.entrypoints=websecure"
      - "traefik.http.routers.zullya-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.zullya-api.loadbalancer.server.port=3001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # SITE INSTITUCIONAL - Next.js  →  zullya.com.br
  # ============================================================
  site:
    build:
      context: ./site
      dockerfile: Dockerfile
    container_name: zullya-site
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - zullya-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=zullya-erp_zullya-net"
      - "traefik.http.routers.zullya-site.rule=Host(`zullya.com.br`) || Host(`www.zullya.com.br`)"
      - "traefik.http.routers.zullya-site.entrypoints=websecure"
      - "traefik.http.routers.zullya-site.tls.certresolver=letsencrypt"
      - "traefik.http.services.zullya-site.loadbalancer.server.port=3000"
      # www → sem www
      - "traefik.http.middlewares.www-to-root.redirectregex.regex=^https://www\\.zullya\\.com\\.br/(.*)"
      - "traefik.http.middlewares.www-to-root.redirectregex.replacement=https://zullya.com.br/$${1}"
      - "traefik.http.middlewares.www-to-root.redirectregex.permanent=true"
      - "traefik.http.routers.zullya-site.middlewares=www-to-root"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # FRONTEND ERP - React + Nginx  →  app.zullya.com.br
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.zullya.com.br/api}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: zullya-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - zullya-net
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=zullya-erp_zullya-net"
      - "traefik.http.routers.zullya-frontend.rule=Host(`app.zullya.com.br`)"
      - "traefik.http.routers.zullya-frontend.entrypoints=websecure"
      - "traefik.http.routers.zullya-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.zullya-frontend.loadbalancer.server.port=80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # PAINEL DOCKER - Portainer
  # ============================================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: zullya-portainer
    restart: unless-stopped
    profiles:
      - production
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - zullya-net

  # ============================================================
  # BACKUP AUTOMÁTICO - PostgreSQL para Nuvem
  # ============================================================
  pg-backup:
    image: eeshugerman/postgres-backup-s3:16
    container_name: zullya-backup
    restart: unless-stopped
    profiles:
      - production
    environment:
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 30
      PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE:-}
      S3_REGION: ${BACKUP_S3_REGION:-sa-east-1}
      S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      S3_PREFIX: zullya-erp-backups
      S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_KEY:-}
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: ${DB_NAME:-zullya_erp}
      POSTGRES_USER: ${DB_USER:-zullya_erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zullya_senha_local}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zullya-net

  # ============================================================
  # MONITORAMENTO - Uptime Kuma
  # ============================================================
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: zullya-monitor
    restart: unless-stopped
    profiles:
      - production
    ports:
      - "127.0.0.1:3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - zullya-net

# ============================================================
# VOLUMES
# ============================================================
volumes:
  postgres_data:
  redis_data:
  portainer_data:
  uptime_kuma_data:
