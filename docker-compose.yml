# ============================================================
# Açaí ERP SaaS - Docker Compose (Produção / VPS Hostinger)
# Domínio: zullya.com.br | API: api.zullya.com.br
# SSL automático via Traefik + Let's Encrypt (já configurado)
# ============================================================

networks:
  acai-net:
    driver: bridge
  traefik-net:
    external: true   # rede compartilhada com o Traefik da Hostinger

services:

  # ============================================================
  # BANCO DE DADOS - PostgreSQL 16
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: acai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-acai_erp}
      POSTGRES_USER: ${DB_USER:-acai_erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-acai_senha_local}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - acai-net
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-acai_erp_user} -d ${DB_NAME:-acai_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # CACHE E SESSÕES - Redis 7
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: acai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - acai-net
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # BACKEND - API Node.js  →  api.zullya.com.br
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acai-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-acai_erp}
      DB_USER: ${DB_USER:-acai_erp_user}
      DB_PASSWORD: ${DB_PASSWORD:-acai_senha_local}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_minimo_32_caracteres_aqui}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_minimo_32_caracteres}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      FRONTEND_URL: ${FRONTEND_URL:-https://zullya.com.br}
      RRPAY_WEBHOOK_SECRET: ${RRPAY_WEBHOOK_SECRET:-}
      RRPAY_API_KEY: ${RRPAY_API_KEY:-}
      RRPAY_BASE_URL: ${RRPAY_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - acai-net
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.acai-api.rule=Host(`api.zullya.com.br`)"
      - "traefik.http.routers.acai-api.entrypoints=websecure"
      - "traefik.http.routers.acai-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.acai-api.loadbalancer.server.port=3001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # FRONTEND - React + Nginx  →  zullya.com.br
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.zullya.com.br/api}
    container_name: acai-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - acai-net
      - traefik-net
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      # Rota principal: zullya.com.br e www.zullya.com.br
      - "traefik.http.routers.acai-frontend.rule=Host(`zullya.com.br`) || Host(`www.zullya.com.br`)"
      - "traefik.http.routers.acai-frontend.entrypoints=websecure"
      - "traefik.http.routers.acai-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.acai-frontend.loadbalancer.server.port=80"
      # Redirecionar www → sem www
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.zullya\\.com\\.br/(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://zullya.com.br/$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.acai-frontend.middlewares=www-redirect"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # PAINEL DOCKER - Portainer
  # ============================================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: acai-portainer
    restart: unless-stopped
    profiles:
      - production
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - acai-net

  # ============================================================
  # BACKUP AUTOMÁTICO - PostgreSQL para Nuvem
  # ============================================================
  pg-backup:
    image: eeshugerman/postgres-backup-s3:16
    container_name: acai-backup
    restart: unless-stopped
    profiles:
      - production
    environment:
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 30
      PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE:-}
      S3_REGION: ${BACKUP_S3_REGION:-sa-east-1}
      S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      S3_PREFIX: acai-erp-backups
      S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_KEY:-}
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: ${DB_NAME:-acai_erp}
      POSTGRES_USER: ${DB_USER:-acai_erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-acai_senha_local}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - acai-net

  # ============================================================
  # MONITORAMENTO - Uptime Kuma
  # ============================================================
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: acai-monitor
    restart: unless-stopped
    profiles:
      - production
    ports:
      - "127.0.0.1:3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - acai-net

# ============================================================
# VOLUMES
# ============================================================
volumes:
  postgres_data:
  redis_data:
  portainer_data:
  uptime_kuma_data:
