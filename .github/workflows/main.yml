name: CI/CD - Zullya ERP

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Instalar dependências (ERP)
      run: npm install --legacy-peer-deps

    - name: Lint (ERP)
      run: npm run lint
      continue-on-error: true

    - name: Build (ERP)
      run: npm run build

    - name: Instalar dependências (Site)
      working-directory: ./site
      run: npm install --legacy-peer-deps

    - name: Build (Site)
      working-directory: ./site
      run: npm run build

    - name: Verificar Docker build (ERP frontend)
      run: docker build -t zullya-erp-frontend:test .

    - name: Verificar Docker build (Site)
      run: docker build -t zullya-site:test ./site

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
    - name: Deploy na VPS Hostinger via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        script: |
          set -e
          cd /opt/zullya-erp

          echo "📥 Atualizando código..."
          git fetch origin main
          git reset --hard origin/main

          echo "🐳 Subindo containers (ERP + Site)..."
          docker compose --profile production up -d --build --remove-orphans

          echo "🧹 Limpando imagens antigas..."
          docker image prune -f

          echo "✅ Deploy concluído em $(date '+%d/%m/%Y %H:%M:%S')"
          docker compose ps
