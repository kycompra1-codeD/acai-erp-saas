name: CI/CD - Açaí ERP SaaS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Lint
      run: npm run lint
      continue-on-error: true

    - name: Run Build
      run: npm run build

    - name: Build Docker image (verificação)
      run: docker build -t acai-erp-frontend:test .

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
    - name: Deploy na VPS Hostinger via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        script: |
          set -e
          cd /opt/acai-erp

          echo "📥 Atualizando código..."
          git pull origin main

          echo "🐳 Subindo containers..."
          docker compose --profile production up -d --build --remove-orphans

          echo "🧹 Limpando imagens antigas..."
          docker image prune -f

          echo "✅ Deploy concluído em $(date '+%d/%m/%Y %H:%M:%S')"
          docker compose ps
